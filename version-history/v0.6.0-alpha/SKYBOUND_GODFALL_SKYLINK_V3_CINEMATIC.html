<script>

// ============================================================

//  Signature hook: SKYLINK CATALYST. The first shot chooses the war,
//  then every marked kill points to the next connected target.
//  IUT ICT FEST 2026 GameJam · HTML5 Canvas · no dependencies
//  ARROWS/WASD fly · SPACE fire · P pause · M mute

//  (game auto-falls back to built-in art if files are absent)
// ============================================================
const cv=document.getElementById("game"),ctx=cv.getContext("2d");
const W=cv.width,H=cv.height;
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a), irand=(a,b)=>Math.floor(rand(a,b+1));
const d2=(x1,y1,x2,y2)=>{const dx=x2-x1,dy=y2-y1;return dx*dx+dy*dy;};
const freshSeed=()=>{
  try{const a=new Uint32Array(1);crypto.getRandomValues(a);return (a[0]^Date.now()^Math.floor(performance.now()*1000))>>>0;}
  catch(e){return (Date.now()^Math.floor(Math.random()*0xffffffff))>>>0;}
};
function nextRunRandom(){
  if(!world)return Math.random();
  let x=world.rngState>>>0;x^=x<<13;x^=x>>>17;x^=x<<5;world.rngState=x>>>0;return (world.rngState>>>0)/4294967296;
}
const wrand=(a,b)=>a+nextRunRandom()*(b-a), wirand=(a,b)=>Math.floor(wrand(a,b+1));
function shuffled(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=wirand(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}

  tiles:"assets/tiles.png"};

for(const k in SPRITE_FILES){

function sprite(k){return IMGS[k]||null;}

 {key:"VETERAN",desc:'"Fear is fuel."',color:"#ffb000",enemies:["turret","patrol"],
  fire:1.0,speed:1.0,dmg:1.0,coinReqMult:1.3,scoreMult:1.5},
 {key:"EXTREME",desc:'"NIGHTMARE!!"',color:"#ff4040",enemies:["turret","patrol","chaser"],
  fire:.6,speed:1.15,dmg:1.4,coinReqMult:1.6,scoreMult:2.2},
];

// ---------- levels ----------
const LEVELS=[

 {name:"BLOOD MONEY",      tag:"Every coin has a corpse attached.",        dist:2700,obst:1.0,enemy:.65,boss:false,weather:["clear","sunset"]},

 {name:"WIDOWMAKER WINDS", tag:"The storm takes no prisoners.",            dist:3100,obst:1.1,enemy:.85,boss:false,weather:["clear","storm"]},

// Every boss stage has its own aircraft, movement language, attacks and audio identity.
const BOSS_PROFILES={
  2:{id:"iron",name:"IRON HOWL",sub:"SIEGE DREADNOUGHT",hp:470,r:54,ty:132,primary:"#c64f3c",dark:"#48221f",glow:"#ffb073"},
  5:{id:"butcher",name:"THE BUTCHER",sub:"RAZOR-WING ACE",hp:590,r:49,ty:126,primary:"#9d2637",dark:"#35131c",glow:"#ff5f82"},
  8:{id:"executioner",name:"THE EXECUTIONER",sub:"VOID INTERDICTOR",hp:720,r:52,ty:128,primary:"#7255a8",dark:"#231a3b",glow:"#caa8ff"},
  9:{id:"godfall",name:"SERAPH-0",sub:"THE FALLEN SKY GOD",hp:980,r:61,ty:135,primary:"#57408b",dark:"#171128",glow:"#d6b5ff"}
};

  surge:{name:"RAPTOR SURGE",short:"SURGE",color:"#69e7ff",desc:"Firepower evolves two links earlier."},

};
// coins required (on previous level) to unlock level i
function coinReq(i){return Math.round((8+i*3)*DIFFS[diffIdx].coinReqMult);}
// progress[diff][level]={cleared,bestCoins}   (session memory)
const progress=DIFFS.map(()=>LEVELS.map(()=>({cleared:false,bestCoins:0})));
function unlocked(i){
  if(i===0)return true;
  const p=progress[diffIdx][i-1];
  return p.cleared&&p.bestCoins>=coinReq(i);
}

// ---------- weather ----------
const WEATHER={
 clear: {ground:"#3f7d46",water:"#2e6da3",tint:null,          rain:false,wind:0, dark:0},
 sunset:{ground:"#6b5a3e",water:"#7a4a63",tint:"rgba(255,140,60,.14)",rain:false,wind:25,dark:.05},
 storm: {ground:"#2c4636",water:"#20415c",tint:"rgba(40,55,70,.28)", rain:true, wind:80,dark:.18},
 night: {ground:"#182a1e",water:"#101d33",tint:"rgba(8,12,40,.4)",   rain:false,wind:0, dark:.35},
};

// ---------- audio: cinematic air combat — layered transients, sub impact and synthetic reverb ----------
let AC=null,muted=false,engineGain=null,musicTimer=null,mStep=0;
function makeImpulse(seconds=2.1,decay=2.8){
  const len=Math.floor(AC.sampleRate*seconds),buf=AC.createBuffer(2,len,AC.sampleRate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}
function audioInit(){
  if(AC)return;
  try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  const compressor=AC.createDynamicsCompressor();compressor.threshold.value=-20;compressor.knee.value=18;
  compressor.ratio.value=4;compressor.attack.value=.008;compressor.release.value=.28;compressor.connect(AC.destination);
  const master=AC.createGain();master.gain.value=.72;master.connect(compressor);
  const reverb=AC.createConvolver();reverb.buffer=makeImpulse();
  const wet=AC.createGain();wet.gain.value=.18;reverb.connect(wet);wet.connect(compressor);
  AC.master=master;AC.reverb=reverb;
  const o=AC.createOscillator(),lp=AC.createBiquadFilter();engineGain=AC.createGain();engineGain.gain.value=0;
  o.type="sawtooth";o.frequency.value=43;lp.type="lowpass";lp.frequency.value=135;lp.Q.value=.55;
  o.connect(lp);lp.connect(engineGain);engineGain.connect(master);o.start();
  const roots=[55,55,65.41,49,55,73.42,65.41,49];
  musicTimer=setInterval(()=>{
    if(muted||!AC||state!=="playing"||paused)return;
    const r=roots[mStep%roots.length],awake=world&&world.awakened,intensity=awake?1:.4;
    softTone(r,2.8,.020*intensity,"sine",.35,0,.34);
    softTone(r*2,1.7,.008*intensity,"triangle",.2,(mStep%2?-.25:.25),.42);
    if(awake&&hud&&hud.chain>=6)softTone(r*3,1.15,.006,"sine",.12,0,.55);
    mStep++;
  },1350);
}
function outNode(){return AC&&AC.master?AC.master:AC.destination;}
function routeAudio(node,wet=.22){node.connect(outNode());if(AC&&AC.reverb&&wet>0)node.connect(AC.reverb);}
function softTone(f,d,v,type="sine",attack=.01,pan=0,wet=.2){
  if(!AC||muted)return;const o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();
  const p=AC.createStereoPanner?AC.createStereoPanner():null,now=AC.currentTime;
  o.type=type;o.frequency.value=f;lp.type="lowpass";lp.frequency.value=Math.max(320,f*3.5);lp.Q.value=.5;
  g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(v,now+attack);g.gain.exponentialRampToValueAtTime(.0001,now+d);
  o.connect(lp);lp.connect(g);if(p){p.pan.value=clamp(pan,-1,1);g.connect(p);routeAudio(p,wet);}else routeAudio(g,wet);
  o.start(now);o.stop(now+d+.04);
}
function glide(f1,f2,d,v,type="sine",pan=0,wet=.16){
  if(!AC||muted)return;const o=AC.createOscillator(),g=AC.createGain(),bp=AC.createBiquadFilter();
  const p=AC.createStereoPanner?AC.createStereoPanner():null,now=AC.currentTime;
  o.type=type;o.frequency.setValueAtTime(Math.max(25,f1),now);o.frequency.exponentialRampToValueAtTime(Math.max(25,f2),now+d);
  bp.type="bandpass";bp.frequency.value=Math.sqrt(Math.max(1,f1*f2));bp.Q.value=.62;
  g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(v,now+.006);g.gain.exponentialRampToValueAtTime(.0001,now+d);
  o.connect(bp);bp.connect(g);if(p){p.pan.value=clamp(pan,-1,1);g.connect(p);routeAudio(p,wet);}else routeAudio(g,wet);
  o.start(now);o.stop(now+d+.04);
}
function airNoise(d,v,frequency=900,pan=0,wet=.12){
  if(!AC||muted)return;const n=Math.max(1,Math.floor(AC.sampleRate*d)),b=AC.createBuffer(1,n,AC.sampleRate),dd=b.getChannelData(0);
  for(let i=0;i<n;i++){const env=Math.sin(Math.PI*i/n)*Math.pow(1-i/n,.3);dd[i]=(Math.random()*2-1)*env;}
  const source=AC.createBufferSource(),bp=AC.createBiquadFilter(),g=AC.createGain();const p=AC.createStereoPanner?AC.createStereoPanner():null;
  source.buffer=b;bp.type="bandpass";bp.frequency.value=frequency;bp.Q.value=.7;g.gain.value=v;source.connect(bp);bp.connect(g);
  if(p){p.pan.value=clamp(pan,-1,1);g.connect(p);routeAudio(p,wet);}else routeAudio(g,wet);source.start();
}
function chainChime(chain){
  const notes=[220,246.94,293.66,329.63,392,440,493.88],root=notes[Math.min(notes.length-1,Math.floor(chain/2))];
  softTone(root,.38,.026,"sine",.012,-.12,.5);softTone(root*1.5,.7,.015,"triangle",.025,.18,.65);
}
function bossHorn(id){
  const f=id==="iron"?62:id==="butcher"?78:id==="executioner"?52:43;
  glide(f,f*1.5,1.1,.052,"sawtooth",0,.55);softTone(f/2,1.4,.035,"sine",.03,0,.6);airNoise(.7,.025,240,0,.5);
}
const SFX={
  coin:()=>{softTone(760,.32,.018,"sine",.01,.2,.45);softTone(1140,.55,.010,"sine",.025,-.15,.6);},
  fuel:()=>{glide(120,420,.48,.026,"triangle",0,.35);airNoise(.22,.01,820,0,.4);},
  hp:()=>{softTone(196,.6,.022,"sine",.05,-.2,.5);softTone(294,.8,.016,"sine",.08,.2,.65);},
  power:()=>{glide(90,720,.72,.036,"sine",0,.5);airNoise(.42,.019,1250,0,.55);},
  shoot:()=>{airNoise(.075,.032,2600,0,.09);glide(760,150,.10,.024,"triangle",0,.12);softTone(72,.12,.018,"sine",.004,0,.05);},
  eshoot:()=>{airNoise(.11,.022,950,0,.18);glide(260,88,.16,.024,"sawtooth",0,.22);},
  hit:()=>{airNoise(.28,.075,230,0,.28);glide(120,38,.34,.055,"sine",0,.34);},
  ehit:()=>{airNoise(.09,.026,1450,0,.12);glide(500,145,.12,.018,"triangle",0,.18);},
  boom:()=>{airNoise(.58,.12,150,0,.45);glide(92,28,.65,.082,"sine",0,.4);softTone(46,.72,.026,"sine",.008,0,.5);},
  bigboom:()=>{airNoise(1.15,.17,105,0,.62);glide(68,24,1.18,.11,"sine",0,.58);softTone(34,1.3,.048,"sine",.005,0,.65);},
  click:()=>softTone(310,.18,.012,"sine",.006,0,.35),
  chain:(n)=>chainChime(n),
  done:()=>{softTone(196,.9,.032,"sine",.08,-.2,.65);setTimeout(()=>softTone(293.66,1,.029,"sine",.08,.15,.7),120);setTimeout(()=>softTone(392,1.3,.023,"sine",.1,0,.75),260);},
  alarm:()=>{glide(92,138,.9,.038,"sawtooth",0,.5);airNoise(.48,.016,360,0,.55);},
  boss:(id)=>bossHorn(id),
  ignite:(doctrine)=>{const f=doctrine==="surge"?110:doctrine==="storm"?82:98;glide(f,f*6,1.0,.05,"sine",0,.7);airNoise(.75,.04,700,0,.72);softTone(f/2,1.4,.035,"sine",.01,0,.7);}
};

// ---------- input ----------
const keys={};
window.addEventListener("keydown",e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key))e.preventDefault();
  keys[e.key.length===1?e.key.toLowerCase():e.key]=true;
  audioInit();onKey(e.key.length===1?e.key.toLowerCase():e.key);
});
window.addEventListener("keyup",e=>{keys[e.key.length===1?e.key.toLowerCase():e.key]=false;});
let mouse={x:0,y:0};
cv.addEventListener("mousemove",e=>{const r=cv.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height);});
cv.addEventListener("click",()=>{audioInit();onClick();});

// ---------- state ----------
let state="menu",paused=false,diffIdx=0,levelIdx=0,buttons=[];
let P,world,ents,fx,wS,hud,boss;

function newGame(){
  const D=DIFFS[diffIdx],L=LEVELS[levelIdx];
  P={x:W/2,y:H-120,vx:0,vy:0,r:15,hp:100,fuel:100,shield:0,boost:0,gunCd:0,weaponPulse:0,
     alive:true,deadT:0,phase:"takeoff",toSpeed:0,toDist:0,lift:0};
  const seed=freshSeed();
  world={scroll:0,dist:0,goal:L.dist,speed:190*D.speed,shake:0,levelT:0,
    tObst:rand(.8,2.2),tEnemy:rand(.7,2.4),tCoin:rand(.45,1.5),tFuel:rand(4.2,7.2),tHp:rand(6.5,10),tPower:rand(8,13),bossSpawned:false,
    awakened:false,kickoffSpawned:false,kickoffFlash:0,doctrine:null,seed,rngState:seed,
    formationBag:[],lastFormation:"",encounterCount:0,signature:seed.toString(16).toUpperCase().padStart(8,"0").slice(-6),
    clouds:Array.from({length:18},()=>({x:rand(-80,W+80),y:rand(-80,H+40),r:rand(45,125),a:rand(.025,.09),s:rand(.16,.46)})),
    windLines:[]};
  ents={enemies:[],ebul:[],pbul:[],pickups:[],ground:[]};
  fx={parts:[],lightning:0,links:[],rings:[]};
  boss=null;
  wS={seq:L.weather,idx:0,cur:L.weather[0],next:L.weather[0],t:1,timer:15};
  hud={score:0,coins:0,msg:"",msgT:0,deathReason:"",chain:0,bestChain:0,
    chainT:0,chainMaxT:4.2,chainTarget:null};
  paused=false;
  // pre-seed ground decor
  for(let i=0;i<26;i++)seedGround(rand(0,H));
}
function seedGround(y){
  ents.ground.push({x:rand(0,W),y:y,r:rand(24,90),type:Math.random()<.6?"island":"reef"});
}

// ---------- encounter director: shuffled formations, randomized lanes and no repeated opening map ----------
function considerChainTarget(e){
  if(!world||!world.awakened||!hud||hud.chain<=0||hud.chainTarget||e.type==="relay")return;
  e.linked=Math.max(e.linked||0,hud.chainT||hud.chainMaxT);hud.chainTarget=e;
}
function addEnemy(e){e.linked=e.linked||0;ents.enemies.push(e);considerChainTarget(e);return e;}
function makeEnemy(type,x=wrand(55,W-55),y=wrand(-80,-35),extra={}){
  const defs={
    turret:{hp:2,cool:wrand(.65,1.7),r:18,drift:wrand(-16,16)},
    patrol:{hp:2,cool:wrand(.65,1.6),ph:wrand(0,7),baseX:x,weave:wrand(45,105),turn:wrand(1.7,3.1),drop:wrand(30,72),r:16},
    chaser:{hp:1,vx:wrand(-30,30),vy:wrand(100,155),r:13},
    interceptor:{hp:2,cool:wrand(.55,1.35),ph:wrand(0,7),baseX:x,weave:wrand(75,155),turn:wrand(2.5,4.2),drop:wrand(75,125),r:15},
    bomber:{hp:5,cool:wrand(.85,1.7),drift:wrand(-52,52),drop:wrand(12,35),r:25},
    specter:{hp:2,cool:wrand(.75,1.65),ph:wrand(0,7),baseX:x,weave:wrand(100,190),turn:wrand(1.5,2.7),drop:wrand(42,78),alpha:1,r:16},
    blimp:{hp:4,r:30,drift:wrand(-36,36)},mine:{hp:1,r:16,spin:wrand(0,6.28)}
  };
  return addEnemy(Object.assign({type,x,y},defs[type]||defs.patrol,extra));
}
function enemyPool(){
  const pool=["turret","patrol","patrol"];
  if(levelIdx>=1||diffIdx>=1)pool.push("interceptor");
  if(levelIdx>=2||diffIdx===2)pool.push("chaser");
  if(levelIdx>=3)pool.push("bomber");
  if(levelIdx>=5)pool.push("specter");
  if(levelIdx>=7)pool.push("interceptor","specter");
  return diffIdx===0&&levelIdx<2?["turret","patrol","patrol","interceptor"]:pool;
}
function nextFormation(){
  const all=["solo","split","v","gate","cross","escort","ambush","stagger","swarm"];
  if(!world.formationBag.length){
    world.formationBag=shuffled(all);
    if(world.formationBag[world.formationBag.length-1]===world.lastFormation)world.formationBag.unshift(world.formationBag.pop());
  }
  const f=world.formationBag.pop();world.lastFormation=f;world.encounterCount++;return f;
}
function spawnEnemy(forceSolo=false){
  const pool=enemyPool(),pick=()=>pool[wirand(0,pool.length-1)],formation=forceSolo?"solo":nextFormation();
  const center=wrand(150,W-150),flip=nextRunRandom()<.5?-1:1,j=()=>wrand(-24,24);
  if(formation==="solo")return makeEnemy(pick(),center+j(),wrand(-85,-30));
  if(formation==="split"){
    const t=pick(),gap=wrand(105,210);makeEnemy(t,clamp(center-gap/2,55,W-55),-35+j());return makeEnemy(pick(),clamp(center+gap/2,55,W-55),-70+j());
  }
  if(formation==="v"){
    const t=nextRunRandom()<.55?"patrol":"interceptor",gap=wrand(62,95),depth=wrand(45,82);
    makeEnemy(t,center,-35);makeEnemy(t,center-gap,-35-depth,{ph:wrand(0,6)});return makeEnemy(t,center+gap,-35-depth,{ph:wrand(0,6)});
  }
  if(formation==="gate"){
    const gap=wrand(250,500),left=(W-gap)/2+j();makeEnemy("turret",clamp(left,45,W-45),-35);makeEnemy("turret",clamp(left+gap,45,W-45),-65);
    return makeEnemy(nextRunRandom()<.5?"bomber":"interceptor",clamp(W/2+j()*3,70,W-70),-125);
  }
  if(formation==="cross"){
    makeEnemy("interceptor",center,-30,{baseX:center,weave:wrand(95,150)});makeEnemy("patrol",clamp(center-150*flip,60,W-60),-95);
    return makeEnemy("chaser",clamp(center+135*flip,60,W-60),-145);
  }
  if(formation==="escort"){
    makeEnemy("bomber",center,-55);makeEnemy("interceptor",clamp(center-105,60,W-60),-105,{ph:0});return makeEnemy("interceptor",clamp(center+105,60,W-60),-105,{ph:3.14});
  }
  if(formation==="ambush"){
    const side=flip<0?65:W-65;makeEnemy("specter",side,-25,{baseX:side,weave:wrand(80,135)});makeEnemy("chaser",W-side,-90);return makeEnemy(pick(),center,-150);
  }
  if(formation==="stagger"){
    const n=wirand(3,5);let last=null;for(let i=0;i<n;i++)last=makeEnemy(pick(),clamp(center+(i-(n-1)/2)*wrand(65,92),55,W-55),-30-i*wrand(38,66));return last;
  }
  const n=wirand(4,7);let last=null;for(let i=0;i<n;i++)last=makeEnemy(nextRunRandom()<.55?"chaser":"patrol",wrand(60,W-60),-25-i*wrand(25,52));return last;
}
function spawnObst(){return makeEnemy(nextRunRandom()<.52?"blimp":"mine",wrand(45,W-45),wrand(-90,-35));}
function spawnCoins(){
  const n=wirand(4,8),shape=wirand(0,3),x0=wrand(80,W-80-n*20);
  for(let i=0;i<n;i++){

function ensureChainTarget(){

function clearChainMarks(){for(const n of ents.enemies)n.linked=0;hud.chainTarget=null;}
function chooseNextLink(origin){

  for(const n of ents.enemies){if(n===origin||n.hp<=0||n.type==="relay")continue;const dd=d2(origin.x,origin.y,n.x,n.y);if(dd<bd){bd=dd;best=n;}}

function igniteSky(relay){

function effectiveChain(){return (hud?hud.chain:0)+(world&&world.doctrine==="surge"?2:0);}
function weaponTier(){const c=effectiveChain();return c>=15?4:c>=10?3:c>=6?2:c>=3?1:0;}
function registerChainKill(e){

  hud.bestChain=Math.max(hud.bestChain,hud.chain);hud.chainMaxT=Math.max(2.8,5.1-Math.min(18,hud.chain)*.082);hud.chainT=hud.chainMaxT;

  fx.rings.push({x:e.x,y:e.y,r:8,t:0,life:.5,max:40+Math.min(46,hud.chain*2),color:CATALYSTS[doctrine]?.color||"#74e8ff"});
  if(doctrine==="storm"){
    const nearby=ents.enemies.filter(n=>n!==e&&n.hp>0&&n.type!=="relay"&&d2(e.x,e.y,n.x,n.y)<210*210).sort((a,b)=>d2(e.x,e.y,a.x,a.y)-d2(e.x,e.y,b.x,b.y)).slice(0,2);
    for(const n of nearby){n.hp=Math.max(.3,n.hp-(hud.chain>=10?1.35:.8));fx.links.push({x1:e.x,y1:e.y,x2:n.x,y2:n.y,t:0,life:.38,color:CATALYSTS.storm.color});}
    if(nearby.length)airNoise(.18,.018,1500,0,.55);
  }
  if(doctrine==="aegis"&&hud.chain%4===0){P.shield=Math.max(P.shield,3.2);P.fuel=Math.min(100,P.fuel+7);toast(`AEGIS PULSE x${hud.chain}`);SFX.power();}
  if(hud.chain===3)toast(doctrine==="surge"?"RAPTOR SURGE — TRI-FAN ONLINE":"SKYLINK x3 — RAPID WING GUNS");
  if(hud.chain===6){toast("SKYLINK x6 — TRI-FAN FIRE");P.shield=Math.max(P.shield,3.5);}
  if(hud.chain===10){P.boost=Math.max(P.boost,5);toast("SKYLINK x10 — OVERDRIVE");SFX.power();}
  if(hud.chain===15){P.hp=Math.min(100,P.hp+25);toast("SKYLINK x15 — PIERCING TEMPEST");SFX.done();}
  chooseNextLink(e);
}

// ---------- combat helpers ----------
function damagePlayer(amt,reason){
  if(!P.alive)return;
  if(P.shield>0){P.shield=0;world.shake=6;SFX.hit();toast("SHIELD DOWN");return;}
  P.hp-=amt*DIFFS[diffIdx].dmg;world.shake=Math.max(world.shake,6);SFX.hit();
  for(let i=0;i<8;i++)fx.parts.push({x:P.x,y:P.y,vx:rand(-120,120),vy:rand(-120,120),life:.4,t:0,c:"#ff9040",r:3});
  if(P.hp<=0){P.hp=0;kill(reason);}
}
function kill(reason){
  if(!P.alive)return;
  P.alive=false;P.deadT=0;world.shake=16;hud.deathReason=reason;SFX.bigboom();
  for(let i=0;i<44;i++)fx.parts.push({x:P.x,y:P.y,vx:rand(-240,240),vy:rand(-240,240),
    life:rand(.4,1.1),t:0,c:Math.random()<.5?"#ff7940":"#ffd23f",r:rand(2,6)});
}
function toast(m){hud.msg=m;hud.msgT=1.8;}
function enemyDie(e){

  if(Math.random()<.3)ents.pickups.push({type:"coin",x:e.x,y:e.y,r:11,t:0});
}

// ---------- escalating weapon system: the chain directly increases firepower ----------
function playerBullet(x,y,vx,vy,dmg=1,pierce=0,r=4){ents.pbul.push({x,y,vx,vy,dmg,pierce,r,life:1.7});}
function fireWeapon(){
  const tier=weaponTier(),speed=590,spread=[0,.055,.095,.135,.17][tier];
  const count=[2,3,3,5,7][tier],doctrineBoost=world.doctrine==="surge"?1.14:1,damage=[1,1.15,1.35,1.7,2.15][tier]*doctrineBoost,pierce=tier>=4?2:tier>=3?1:0;
  if(tier===0){playerBullet(P.x-10,P.y-18,0,-speed,damage,0,4);playerBullet(P.x+10,P.y-18,0,-speed,damage,0,4);}
  else{
    for(let i=0;i<count;i++){
      const a=(i-(count-1)/2)*spread;
      playerBullet(P.x+(i-(count-1)/2)*6,P.y-18,Math.sin(a)*speed,-Math.cos(a)*speed,damage,pierce,4+tier*.45);
    }
  }
  P.gunCd=[.17,.135,.112,.09,.072][tier];P.weaponPulse=.13;SFX.shoot();
}

// ---------- update ----------
let last=performance.now();
function frame(now){
  const dt=Math.min((now-last)/1000,.033);last=now;
  if(state==="playing"&&!paused)update(dt);
  draw();
  requestAnimationFrame(frame);
}
function update(dt){
  const D=DIFFS[diffIdx],L=LEVELS[levelIdx];
  world.levelT+=dt;

  // weather
  wS.timer-=dt;
  if(wS.t<1)wS.t=Math.min(1,wS.t+dt/2.5);
  if(wS.timer<=0&&wS.seq.length>1){
    wS.idx=(wS.idx+1)%wS.seq.length;wS.cur=wS.next;wS.next=wS.seq[wS.idx];wS.t=0;wS.timer=15;
  }
  const wA=WEATHER[wS.cur],wB=WEATHER[wS.next];
  const wind=lerp(wA.wind,wB.wind,wS.t);
  const raining=wS.t>.5?wB.rain:wA.rain;
  if(raining&&Math.random()<.006)fx.lightning=.18;
  if(fx.lightning>0)fx.lightning-=dt;

  // ---- player ----
  if(P.alive){
    if(P.phase==="takeoff"){
      // throttle up on runway
      if(keys["ArrowUp"]||keys["w"])P.toSpeed+=95*dt; else P.toSpeed=Math.max(0,P.toSpeed-40*dt);
      P.toDist+=P.toSpeed*dt;
      // slight steering on runway
      const steer=((keys["ArrowRight"]||keys["d"])?1:0)-((keys["ArrowLeft"]||keys["a"])?1:0);
      P.x=clamp(P.x+steer*70*dt,W/2-70,W/2+70);
      world.scroll+=P.toSpeed*dt;
      if(P.toSpeed>=160){P.phase="lift";P.lift=0;toast("WHEELS UP!");SFX.power();}
      else if(P.toDist>900)kill("RAN OUT OF RUNWAY");
      if(engineGain)engineGain.gain.value=muted?0:.02+P.toSpeed/160*.03;
    }else{
      if(P.phase==="lift"){P.lift+=dt;if(P.lift>1){P.phase="armed";spawnKickoffRelay();}}
      // smooth, responsive control: velocity chases input directly
      const maxs=340;
      const ix=((keys["ArrowRight"]||keys["d"])?1:0)-((keys["ArrowLeft"]||keys["a"])?1:0);
      const iy=((keys["ArrowDown"]||keys["s"])?1:0)-((keys["ArrowUp"]||keys["w"])?1:0);
      P.vx=lerp(P.vx,ix*maxs,.28);P.vy=lerp(P.vy,iy*maxs,.28);
      P.x=clamp(P.x+(P.vx-wind*.3)*dt,26,W-26);
      P.y=clamp(P.y+P.vy*dt,60,H-60);

      // gun: each SkyLink tier changes rate, spread, damage and penetration
      P.gunCd-=dt;if(P.weaponPulse>0)P.weaponPulse-=dt;
      if((keys[" "])&&P.gunCd<=0)fireWeapon();
      if(world.awakened)P.fuel-=dt*(2.2+(P.boost>0?1.4:0));
      if(P.fuel<=0){P.fuel=0;kill("FUEL EMPTY");}
      if(P.shield>0)P.shield-=dt;
      if(P.boost>0)P.boost-=dt;
      if(engineGain)engineGain.gain.value=muted?0:.04+(P.boost>0?.02:0);
      if(Math.random()<.7)fx.parts.push({x:P.x+rand(-6,6),y:P.y+20,vx:rand(-15,15),vy:130,
        life:rand(.2,.4),t:0,c:P.boost>0?"#7fd4ff":"#d8dee5",r:rand(2,4)});
    }
  }else{
    P.deadT+=dt;if(engineGain)engineGain.gain.value=0;
    if(P.deadT>1.6){state="gameover";buildButtons();}
  }

  // SKYLINK timer: boss encounters lock earned firepower; missing/off-screen targets are replaced fairly
  if(world.awakened&&hud.chain>0){
    if(boss)hud.chainT=hud.chainMaxT;else hud.chainT-=dt;
    if(hud.chainTarget)hud.chainTarget.linked=Math.max(0,hud.chainT);
    if(!boss)ensureChainTarget();
    if(hud.chainT<=0){
      const lost=hud.chain;clearChainMarks();hud.chain=0;hud.chainT=0;
      if(lost>=3){toast(`SKYLINK x${lost} LOST`);SFX.hit();}
    }
  }
  if(world.kickoffFlash>0)world.kickoffFlash-=dt;

  // ---- world scroll & progress ----
  const airborne=P.phase!=="takeoff"&&P.alive;
  const flying=airborne&&world.awakened;
  const spd=flying?world.speed*(P.boost>0?1.5:1):0;
  if(flying){
    world.scroll+=spd*dt;
    if(!boss)world.dist+=spd*dt;
    hud.score+=dt*10*D.scoreMult*(P.boost>0?2:1);
  }
  // ground decor recycle
  for(const g of ents.ground)g.y+=spd*dt*.6;
  ents.ground=ents.ground.filter(g=>g.y<H+120);
  while(ents.ground.length<26)seedGround(rand(-140,-20));

  // level goal → boss or complete
  if(flying&&!boss){
    if(L.boss==="ultimate"&&!world.bossSpawned&&world.levelT>3){world.bossSpawned=true;spawnBoss();}
    else if(world.dist>=world.goal){
      if(L.boss&&!world.bossSpawned){world.bossSpawned=true;spawnBoss();}
      else if(!L.boss){finishLevel();}
    }
  }

  // spawn timers (not during boss, not on lvl10)
  if(flying&&!boss&&L.boss!=="ultimate"){
    world.tObst-=dt*L.obst;world.tEnemy-=dt*L.enemy;world.tCoin-=dt;world.tFuel-=dt;world.tHp-=dt;world.tPower-=dt;
    if(world.tObst<=0){spawnObst();world.tObst=wrand(.9,2.35)*(nextRunRandom()<.18?.55:1);}
    if(world.tEnemy<=0){spawnEnemy();world.tEnemy=wrand(1.25,3.35)*(levelIdx>5?.78:1)*(nextRunRandom()<.16?.52:1);}
    if(world.tCoin<=0){spawnCoins();world.tCoin=wrand(1.05,3.05);}
    if(world.tFuel<=0){pk("fuel");world.tFuel=wrand(4.8,8.3);}
    if(world.tHp<=0){pk("hp");world.tHp=wrand(6.8,12.4);}
    if(world.tPower<=0){pk(nextRunRandom()<.5?"shield":"boost");world.tPower=wrand(8.3,15.2);}
  }
  // boss fight support drops
  if(boss&&Math.random()<dt*.14)pk(Math.random()<.5?"fuel":"hp");

  // ---- enemies ----
  for(const e of ents.enemies){
    e.y+=spd*dt;
    if(e.type==="relay"){e.spin=(e.spin||0)+dt*(1.5+(e.doctrine==="storm"?1.4:.6));}
    else if(e.type==="turret"){
      e.cool-=dt;
      if(e.cool<=0&&e.y>0&&e.y<P.y-40&&P.alive){
        const a=Math.atan2(P.y-e.y,P.x-e.x),bs=240;
        ents.ebul.push({x:e.x,y:e.y,vx:Math.cos(a)*bs,vy:Math.sin(a)*bs,r:5});
        e.cool=rand(1.2,2.2)*D.fire;SFX.eshoot();
      }
    }else if(e.type==="patrol"){
      e.ph+=dt*(e.turn||2.4);e.x=(e.baseX||e.x)+Math.sin(e.ph)*(e.weave||68);e.y+=(e.drop||45)*dt;e.cool-=dt;
      if(e.cool<=0&&e.y>0&&P.alive){
        ents.ebul.push({x:e.x,y:e.y+16,vx:Math.sin(e.ph)*65,vy:300,r:5});e.cool=rand(1.0,1.9)*D.fire;SFX.eshoot();
      }
    }else if(e.type==="interceptor"){
      e.ph+=dt*((e.turn||3.2)+levelIdx*.04);e.x=e.baseX+Math.sin(e.ph)*(e.weave||115);e.y+=(e.drop||95)*dt;e.cool-=dt;
      if(e.cool<=0&&e.y>20&&e.y<P.y-45&&P.alive){
        const a=Math.atan2(P.y-e.y,P.x-e.x);ents.ebul.push({x:e.x,y:e.y,vx:Math.cos(a)*325,vy:Math.sin(a)*325,r:4});
        e.cool=rand(.75,1.35)*D.fire;SFX.eshoot();
      }
    }else if(e.type==="bomber"){
      e.x+=e.drift*dt;if(e.x<80||e.x>W-80)e.drift*=-1;e.y+=(e.drop||22)*dt;e.cool-=dt;
      if(e.cool<=0&&e.y>10&&e.y<P.y-70){
        for(const vx of[-90,0,90])ents.ebul.push({x:e.x,y:e.y+18,vx,vy:235,r:7});e.cool=rand(1.4,2.1)*D.fire;SFX.eshoot();
      }
    }else if(e.type==="specter"){
      e.ph+=dt*(e.turn||2.1);e.x=e.baseX+Math.sin(e.ph)*(e.weave||150);e.y+=(e.drop||58)*dt;e.alpha=.30+.70*Math.abs(Math.sin(e.ph*.73));e.cool-=dt;
      if(e.cool<=0&&e.alpha>.72&&e.y>0&&P.alive){
        const a=Math.atan2(P.y-e.y,P.x-e.x);for(const o of[-.16,.16])ents.ebul.push({x:e.x,y:e.y,vx:Math.cos(a+o)*270,vy:Math.sin(a+o)*270,r:5});
        e.cool=rand(1.15,1.9)*D.fire;SFX.eshoot();
      }
    }else if(e.type==="chaser"){
      const a=Math.atan2(P.y-e.y,P.x-e.x);
      e.vx=lerp(e.vx,Math.cos(a)*200,.05);e.vy=lerp(e.vy,Math.sin(a)*200,.05);
      e.x+=e.vx*dt;e.y+=e.vy*dt;
      if(Math.random()<.4)fx.parts.push({x:e.x,y:e.y,vx:0,vy:0,life:.3,t:0,c:"#ff8866",r:2});
    }else if(e.type==="blimp"){
      e.x+=e.drift*dt;if(e.x<70||e.x>W-70)e.drift*=-1;
    }else if(e.type==="mine"){e.spin+=dt*3;}
    // collide with player
    if(P.alive&&P.phase!=="takeoff"&&d2(P.x,P.y,e.x,e.y)<(P.r+e.r-4)**2){
      e.hp=0;enemyDie(e);damagePlayer(35,e.type==="mine"?"MINE HIT":"MID-AIR COLLISION");
    }
  }
  // player bullets vs enemies/boss
  for(const b of ents.pbul){
    b.x+=(b.vx||0)*dt;b.y+=b.vy*dt;b.life-=dt;
    for(const e of ents.enemies){
      if(e.hp>0&&d2(b.x,b.y,e.x,e.y)<(e.r+b.r)**2){
        e.hp-=b.dmg||1;SFX.ehit();fx.parts.push({x:b.x,y:b.y,vx:rand(-55,55),vy:rand(-55,55),life:.22,t:0,c:"#d8fbff",r:3});
        if(e.hp<=0)enemyDie(e);
        if((b.pierce||0)>0)b.pierce--;else b.dead=true;break;
      }
    }
    if(boss&&!boss.intro&&!b.dead&&d2(b.x,b.y,boss.x,boss.y)<(boss.r+b.r)**2){
      boss.hp-=3*(b.dmg||1);SFX.ehit();if((b.pierce||0)>0)b.pierce--;else b.dead=true;
      fx.parts.push({x:b.x,y:b.y,vx:rand(-65,65),vy:rand(-65,65),life:.28,t:0,c:"#d8fbff",r:3});
    }
  }
  ents.pbul=ents.pbul.filter(b=>!b.dead&&b.life>0&&b.y>-35&&b.x>-40&&b.x<W+40);
  ents.enemies=ents.enemies.filter(e=>e.hp>0&&e.y<H+90&&e.x>-120&&e.x<W+120);if(world.awakened&&!boss)ensureChainTarget();

  // ---- unique boss AI: every boss stage is a different duel ----
  if(boss){
    boss.t+=dt;
    if(boss.intro){boss.y=lerp(boss.y,boss.ty,.035);boss.alpha=Math.min(1,boss.alpha+dt);if(Math.abs(boss.y-boss.ty)<3)boss.intro=false;}
    else{
      const frac=boss.hp/boss.max,phaseCount=boss.id==="godfall"?4:3;
      const newPhase=Math.min(phaseCount-1,Math.floor((1-frac)*phaseCount));

        hud.bestChain=Math.max(hud.bestChain,hud.chain);hud.chainT=hud.chainMaxT;P.weaponPulse=.48;

      }else if(boss.id==="executioner"){

        boss.alpha=lerp(boss.alpha,1,.08);boss.x=lerp(boss.x,boss.anchorX,.075);boss.y=lerp(boss.y,boss.anchorY,.075);
      }else{
        boss.x=W/2+Math.sin(boss.t*(.58+boss.phase*.08))*amp*.88;
        boss.y=boss.ty+Math.sin(boss.t*(1.13+boss.phase*.11))*47+Math.sin(boss.t*.31)*16;
      }
      if(!Number.isFinite(boss.x)||!Number.isFinite(boss.y)){boss.x=W/2;boss.y=boss.ty;boss.t=0;boss.anchorX=W/2;boss.anchorY=boss.ty;}
      boss.x=clamp(boss.x,boss.r+38,W-boss.r-38);boss.y=clamp(boss.y,88,boss.id==="butcher"?245:215);
      boss.atk-=dt;
      if(boss.atk<=0&&P.alive){const F=DIFFS[diffIdx].fire;

          if(boss.phase===0){const a=Math.atan2(P.y-boss.y,P.x-boss.x);for(let i=-2;i<=2;i++)ents.ebul.push({x:boss.x+i*11,y:boss.y+18,vx:Math.cos(a+i*.055)*275,vy:Math.sin(a+i*.055)*275,r:6});boss.atk=1.05*F;}
          else if(boss.phase===1){for(let i=0;i<9;i++){const a=Math.PI*.18+i*(Math.PI*.64/8);ents.ebul.push({x:boss.x,y:boss.y,vx:Math.cos(a)*245,vy:Math.sin(a)*245,r:7});}boss.atk=1.22*F;}
          else{makeEnemy("interceptor",clamp(boss.x-90,60,W-60),boss.y+25,{hp:2});makeEnemy("interceptor",clamp(boss.x+90,60,W-60),boss.y+25,{hp:2});for(const vx of[-125,0,125])ents.ebul.push({x:boss.x,y:boss.y+25,vx,vy:260,r:8});boss.atk=1.55*F;}
        }else if(boss.id==="butcher"){
          const a=Math.atan2(P.y-boss.y,P.x-boss.x);

          else if(boss.phase===1){for(let i=0;i<12;i++){const q=i/12*Math.PI*2+boss.t;ents.ebul.push({x:boss.x,y:boss.y,vx:Math.cos(q)*225,vy:Math.sin(q)*225,r:6});}boss.atk=1.18*F;}
          else{for(const x of[P.x-95,P.x,P.x+95])for(const vx of[-35,35])ents.ebul.push({x:clamp(x,30,W-30),y:80,vx,vy:350,r:7});boss.atk=.86*F;}
        }else if(boss.id==="executioner"){
          if(boss.phase===0){for(const x of[90,270,450,630,810])if(Math.abs(x-P.x)>65)ents.ebul.push({x,y:boss.y,vx:0,vy:285,r:7});boss.atk=1.3*F;}
          else if(boss.phase===1){const a=Math.atan2(P.y-boss.y,P.x-boss.x);for(let i=-1;i<=1;i++)ents.ebul.push({x:boss.x,y:boss.y,vx:Math.cos(a+i*.08)*365,vy:Math.sin(a+i*.08)*365,r:6});makeEnemy("mine",wrand(80,W-80),boss.y+40);boss.atk=1.0*F;}
          else{for(let i=0;i<16;i++){const q=i/16*Math.PI*2+boss.t*.7;ents.ebul.push({x:boss.x,y:boss.y,vx:Math.cos(q)*245,vy:Math.sin(q)*245,r:6});}boss.atk=1.38*F;}
        }else{

          else if(boss.phase===1){for(let i=0;i<14;i++){const q=i/14*Math.PI*2+boss.t;ents.ebul.push({x:boss.x,y:boss.y,vx:Math.cos(q)*215,vy:Math.sin(q)*215,r:6});}boss.atk=1.25*F;}
          else if(boss.phase===2){makeEnemy("specter",wrand(90,W-90),boss.y+30,{hp:2});makeEnemy("chaser",wrand(90,W-90),boss.y+25,{hp:1});for(const vx of[-150,-75,0,75,150])ents.ebul.push({x:boss.x,y:boss.y,vx,vy:285,r:7});boss.atk=1.05*F;}
          else{for(let i=0;i<4;i++){const q=boss.t*2.8+i*Math.PI/2;ents.ebul.push({x:boss.x,y:boss.y,vx:Math.cos(q)*275,vy:Math.sin(q)*275,r:7});}boss.atk=.25*F;}
        }

      }
      if(boss.hp<=0){SFX.bigboom();world.shake=22;for(let i=0;i<82;i++)fx.parts.push({x:boss.x+wrand(-45,45),y:boss.y+wrand(-35,35),vx:wrand(-285,285),vy:wrand(-285,285),life:wrand(.55,1.55),t:0,c:nextRunRandom()<.55?boss.glow:"#ffd9a6",r:wrand(3,8)});
        hud.score+=(boss.id==="godfall"?2800:950)*DIFFS[diffIdx].scoreMult;boss=null;finishLevel();}
    }
  }

  // ---- enemy bullets ----
  for(const b of ents.ebul){
    b.x+=b.vx*dt;b.y+=(b.vy+spd*.3)*dt;
    if(P.alive&&P.phase!=="takeoff"&&d2(P.x,P.y,b.x,b.y)<(P.r+b.r-3)**2){
      b.dead=true;damagePlayer(15,"SHOT DOWN");}
  }
  ents.ebul=ents.ebul.filter(b=>!b.dead&&b.x>-30&&b.x<W+30&&b.y>-30&&b.y<H+40);

  // ---- pickups ----
  for(const p of ents.pickups){

  // particles & timers
  for(const q of fx.parts){q.t+=dt;q.x+=q.vx*dt;q.y+=q.vy*dt;}

  for(const l of fx.links)l.t+=dt;fx.links=fx.links.filter(l=>l.t<l.life);

  }
  // islands
  if(ents)for(const g of ents.ground){
    if(g.type==="island"){
      ctx.fillStyle=mixc(wA.ground,wB.ground,wt);
      blob(g.x,g.y,g.r);
      ctx.fillStyle="rgba(230,220,170,.5)";
      blob(g.x,g.y,g.r*.55);
      ctx.fillStyle=mixc(wA.ground,wB.ground,wt);
      blob(g.x,g.y,g.r*.42);
    }else{
      ctx.fillStyle="rgba(255,255,255,.14)";blob(g.x,g.y,g.r*.5);
    }
  }

  ctx.save();
  if(world&&world.shake>0)ctx.translate(rand(-world.shake,world.shake),rand(-world.shake,world.shake));

  if(state==="playing"||state==="complete"||state==="gameover"){

      const rx=W/2-90,rw=180;

      ctx.fillStyle="#e8e4d0";

        // runway-end warning stripes approach as toDist grows

          for(let i=0;i<6;i++)ctx.fillRect(rx+i*30,endY,20,26);}

    for(const l of fx.links){

      ctx.beginPath();ctx.moveTo(l.x1,l.y1);

    }

    for(const p of ents.pickups)drawPickup(p);
    // enemies
    for(const e of ents.enemies)drawEnemy(e);
    // boss
    if(boss)drawBoss();
    // swift luminous projectiles with motion trails
    ctx.save();ctx.lineCap="round";
    for(const b of ents.pbul){
      ctx.shadowBlur=16;ctx.shadowColor="#8deaff";ctx.strokeStyle=weaponTier()>=3?"#e9fdff":"#8deaff";ctx.lineWidth=b.r||4;
      ctx.beginPath();ctx.moveTo(b.x-(b.vx||0)*.025,b.y-b.vy*.026);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
    for(const b of ents.ebul){ctx.shadowBlur=12;ctx.shadowColor="#ff725c";ctx.fillStyle="rgba(255,105,78,.88)";ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
      ctx.fillStyle="#ffe0c7";ctx.beginPath();ctx.arc(b.x,b.y,Math.max(2,b.r*.34),0,7);ctx.fill();}

      ctx.beginPath();ctx.arc(q.x,q.y,Math.max(1,q.r*.55),0,Math.PI*2);ctx.fill();}

    for(const r of fx.rings){ctx.globalAlpha=1-r.t/r.life;ctx.strokeStyle=r.color||"#91edff";ctx.shadowBlur=10;ctx.shadowColor=r.color||"#91edff";ctx.lineWidth=3;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();}

       `Score ${Math.floor(hud.score)} · Coins ${hud.coins} · Best chain x${hud.bestChain}`,
       nxt?(okNext?`Next level unlocked!`:`Need ${req} coins to unlock next (got ${hud.coins}) — replay!`)
          :"THE SKY IS YOURS."]);
  }
  if(state==="gameover")drawPanel("KIA","#ff4040",
    [hud.deathReason,`Score ${Math.floor(hud.score)} · Coins ${hud.coins} · Best chain x${hud.bestChain}`,
     boss?"The boss remains…":`${Math.floor(world.dist/Math.max(1,world.goal)*100)}% of ${LEVELS[levelIdx].name}`]);
  if(state==="victory")drawPanel("GOD SLAIN","#ffd23f",
    ["All ten missions conquered.","Your name is carved into the sky, ace."]);
  if(paused&&state==="playing"){
    ctx.fillStyle="rgba(0,0,0,.55)";ctx.fillRect(0,0,W,H);
    txt("PAUSED",W/2,H/2-8,42,"#ffb000","center");
    txt("press P to resume",W/2,H/2+30,16,"#ccc","center");
  }
}
function mixc(a,b,t){
  const parse=c=>{
    if(c[0]==="#")return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
    const m=String(c).match(/[\d.]+/g);return m&&m.length>=3?[+m[0],+m[1],+m[2]]:[0,0,0];
  };
  const c1=parse(a),c2=parse(b);
  return `rgb(${Math.round(lerp(c1[0],c2[0],t))},${Math.round(lerp(c1[1],c2[1],t))},${Math.round(lerp(c1[2],c2[2],t))})`;
}
function blob(x,y,r){
  ctx.beginPath();
  ctx.arc(x,y,r,0,7);ctx.arc(x+r*.6,y+r*.25,r*.7,0,7);ctx.arc(x-r*.55,y+r*.2,r*.6,0,7);
  ctx.fill();
}

  ctx.fillStyle=metal;ctx.strokeStyle="#c2d0d7";ctx.lineWidth=1.2;ctx.beginPath();
  ctx.moveTo(0,-34);ctx.lineTo(7,-19);ctx.lineTo(12,-10);ctx.lineTo(35,5);ctx.lineTo(31,12);ctx.lineTo(13,8);
  ctx.lineTo(10,22);ctx.lineTo(5,29);ctx.lineTo(0,25);ctx.lineTo(-5,29);ctx.lineTo(-10,22);ctx.lineTo(-13,8);

  ctx.fillStyle="#657680";ctx.beginPath();ctx.moveTo(-10,-7);ctx.lineTo(-32,6);ctx.lineTo(-14,7);ctx.lineTo(-4,1);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(10,-7);ctx.lineTo(32,6);ctx.lineTo(14,7);ctx.lineTo(4,1);ctx.closePath();ctx.fill();
  // twin vertical stabilizers

function drawRadar(){
  const rx=W-72,ry=118,rr=58;
  ctx.fillStyle="rgba(8,14,10,.78)";ctx.beginPath();ctx.arc(rx,ry,rr,0,7);ctx.fill();
  ctx.strokeStyle="#2f7d3f";ctx.lineWidth=2;ctx.beginPath();ctx.arc(rx,ry,rr,0,7);ctx.stroke();
  ctx.strokeStyle="rgba(60,160,80,.35)";
  ctx.beginPath();ctx.arc(rx,ry,rr*.55,0,7);ctx.stroke();
  ctx.beginPath();ctx.moveTo(rx-rr,ry);ctx.lineTo(rx+rr,ry);ctx.moveTo(rx,ry-rr);ctx.lineTo(rx,ry+rr);ctx.stroke();
  // sweep
  const sa=performance.now()*.0025;
  const grd=ctx.createLinearGradient(rx,ry,rx+Math.cos(sa)*rr,ry+Math.sin(sa)*rr);
  grd.addColorStop(0,"rgba(70,220,110,0)");grd.addColorStop(1,"rgba(70,220,110,.35)");
  ctx.strokeStyle=grd;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx+Math.cos(sa)*rr,ry+Math.sin(sa)*rr);ctx.stroke();
  // blips (map full playfield into radar)
  const mx=x=>rx+((x-P.x)/W)*rr*1.7, my=y=>ry+((y-P.y)/H)*rr*1.7;
  const blip2=(x,y,c,s)=>{const bx=mx(x),by=my(y);
    if(d2(bx,by,rx,ry)<rr*rr){ctx.fillStyle=c;ctx.fillRect(bx-s/2,by-s/2,s,s);}};
  for(const e of ents.enemies)blip2(e.x,e.y,e.type==="blimp"||e.type==="mine"?"#c8b45a":e.type==="specter"?"#9de8ee":"#ff6b55",4);
  for(const p of ents.pickups)blip2(p.x,p.y,"#ffe066",3);
  if(boss)blip2(boss.x,boss.y,"#c060ff",7);
  ctx.fillStyle="#7fffb0";ctx.fillRect(rx-2,ry-2,4,4);
  txt("RADAR",rx,ry+rr+14,10,"#4fae62","center");
}

      txt(String(b.i+1).padStart(2,"0"),b.x+12,b.y+34,24,L.boss?"#ff5040":"#ffb000");
      if(L.boss)txt(L.boss==="ultimate"?"☠ FINAL":"☠ BOSS",b.x+62,b.y+30,11,"#ff8080");
      if(pr.cleared)txt("✔",b.x+b.w-24,b.y+30,18,"#5dd66b");
      txt(L.name,b.x+12,b.y+56,10,"#fff");
      wrap(L.tag,b.x+12,b.y+74,b.w-22,10,"#8ea2b8");
      if(b.i<9)txt(`next needs ${coinReq(b.i+1)}¢`,b.x+12,b.y+b.h-10,9,"#c8b45a");
    }else{
      txt("🔒",b.x+b.w/2-10,b.y+52,26,"#4a5260");
      txt(`clear LV${b.i} with ${coinReq(b.i)}¢`,b.x+b.w/2,b.y+82,9,"#5a6472","center");
    }
  }
}
function wrap(s,x,y,mw,size,color){
  ctx.font=`${size}px "Courier New",monospace`;ctx.fillStyle=color;ctx.textAlign="left";
  const ws=s.split(" ");let line="",yy=y;
  for(const w of ws){
    if(ctx.measureText(line+w).width>mw){ctx.fillText(line,x,yy);line=w+" ";yy+=size+3;}
    else line+=w+" ";
  }
  ctx.fillText(line,x,yy);
}
function drawPanel(title,color,lines){
  ctx.fillStyle="rgba(4,8,14,.72)";ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(12,18,26,.96)";ctx.fillRect(W/2-270,H/2-135,540,280);
  ctx.strokeStyle=color;ctx.lineWidth=3;ctx.strokeRect(W/2-270,H/2-135,540,280);
  txt(title,W/2,H/2-82,36,color,"center");
  lines.forEach((l,i)=>txt(l,W/2,H/2-40+i*26,14,"#cfd6dd","center"));
  for(const b of buttons){
    ctx.fillStyle=hover(b)?"#2b3648":"#182130";ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.strokeRect(b.x,b.y,b.w,b.h);
    txt(b.label,b.x+b.w/2,b.y+28,15,"#fff","center");
  }
}
function hover(b){return mouse.x>b.x&&mouse.x<b.x+b.w&&mouse.y>b.y&&mouse.y<b.y+b.h;}

// ---------- interactions ----------
function onClick(){
  for(const b of buttons){
    if(!hover(b))continue;
    if(b.act==="level"&&!unlocked(b.i)){SFX.hit();return;}
    SFX.click();
    if(b.act==="diff"){diffIdx=b.i;state="levels";buildButtons();}
    else if(b.act==="level"){levelIdx=b.i;newGame();state="playing";buttons=[];}
    else if(b.act==="back"){state=state==="levels"?"menu":"levels";buildButtons();}
    else if(b.act==="retry"){newGame();state="playing";buttons=[];}
    else if(b.act==="next"){levelIdx++;newGame();state="playing";buttons=[];}
    else if(b.act==="win"){state="victory";buildButtons();}
    else if(b.act==="menu"){state="menu";buildButtons();}
    return;
  }
}
function onKey(k){
  if(k==="m"){muted=!muted;if(engineGain)engineGain.gain.value=0;}
  if(state==="playing"){if(k==="p")paused=!paused;return;}
  if(k==="Enter"){
    if(state==="gameover"){newGame();state="playing";buttons=[];}
    else if(state==="complete"&&levelIdx<9&&unlocked(levelIdx+1)){levelIdx++;newGame();state="playing";buttons=[];}
  }
  if(k==="Escape"&&state==="levels"){state="menu";buildButtons();}
}

// ---------- boot ----------
buildButtons();
requestAnimationFrame(frame);
</script>
